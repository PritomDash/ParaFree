<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 48"
  width="200" height="48">

  <!-- Circle icon mark -->
  <circle cx="24" cy="24" r="22"
    fill="#1a3a2a"/>
  <circle cx="24" cy="24" r="17"
    fill="#2d6a4f"/>

  <!-- P letterform in circle -->
  <rect x="16" y="15" width="3.5"
    height="18" rx="1.75" fill="white"/>
  <rect x="16" y="15" width="11"
    height="3.5" rx="1.75" fill="white"/>
  <rect x="16" y="21.5" width="11"
    height="3.5" rx="1.75" fill="white"/>
  <rect x="23.5" y="15" width="3.5"
    height="10" rx="1.75" fill="white"/>

  <!-- Accent dot -->
  <circle cx="41" cy="38" r="2.5"
    fill="#52b788"/>

  <!-- Para text (dark) -->
  <text x="54" y="31"
    font-family="'Syne','Inter',-apple-system,sans-serif"
    font-size="22"
    font-weight="800"
    fill="#1a1814"
    letter-spacing="-0.8">Para</text>

  <!-- Free text (green) -->
  <text x="116" y="31"
    font-family="'Syne','Inter',-apple-system,sans-serif"
    font-size="22"
    font-weight="800"
    fill="#2d6a4f"
    letter-spacing="-0.8">Free</text>

  <!-- Thin underline accent -->
  <rect x="54" y="36" width="134"
    height="1.5" rx="1"
    fill="#52b788" opacity="0.4"/>

  <!-- Tagline -->
  <text x="54" y="46"
    font-family="-apple-system,sans-serif"
    font-size="7"
    fill="#9e9890"
    letter-spacing="2.5">FREE AI SUITE</text>

</svg>
