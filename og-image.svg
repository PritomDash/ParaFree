<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f17"/>
      <stop offset="50%" style="stop-color:#1a3a2a"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="220" fill="#2d6a4f" opacity="0.2"/>
  <circle cx="100" cy="550" r="180" fill="#52b788" opacity="0.08"/>
  <circle cx="1050" cy="580" r="120" fill="#52b788" opacity="0.06"/>
  <!-- Main card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Logo mark -->
  <rect x="120" y="130" width="52" height="52" rx="12" fill="#52b788"/>
  <text x="146" y="165" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#fff" text-anchor="middle">P</text>
  <!-- Brand name -->
  <text x="186" y="167" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">ParaFree</text>
  <!-- Tagline badge -->
  <rect x="120" y="215" width="200" height="28" rx="14" fill="rgba(82,183,136,0.2)"/>
  <text x="220" y="234" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#52b788" text-anchor="middle" letter-spacing="1.5">FREE · NO WORD LIMIT</text>
  <!-- Main headline -->
  <text x="120" y="310" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-1.5">Paraphrase Documents</text>
  <text x="120" y="375" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="#52b788" letter-spacing="-1.5">Without Losing Formatting</text>
  <!-- Sub text -->
  <text x="120" y="430" font-family="system-ui,sans-serif" font-size="22" fill="rgba(255,255,255,0.7)">Word · PDF · PowerPoint — free, no signup, no limits</text>
  <!-- Feature pills -->
  <rect x="120" y="466" width="145" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="192" y="489" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle">📄 Word DOCX</text>
  <rect x="278" y="466" width="145" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="350" y="489" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle">📊 PowerPoint</text>
  <rect x="436" y="466" width="130" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="501" y="489" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle">📕 PDF</text>
  <rect x="579" y="466" width="145" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="652" y="489" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle">✨ No AI Detect</text>
  <!-- URL -->
  <text x="1080" y="534" font-family="system-ui,sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="end">parafree.app</text>
</svg>
